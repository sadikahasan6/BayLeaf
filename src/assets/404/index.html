    <!-- Custom stlylesheet -->
    <style>

        box-sizing: border-box;
      }

      body {
        padding: 0;
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          "Noto Sans",
          "Liberation Sans",
          sans-serif;
      }

      #notfound {
        position: relative;
        height: 100vh;
      }

      #notfound .notfound {
        position: absolute;
        left: 50%;
        top: 50%;

        background-size: cover;
      }

      .notfound .notfound-404:before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        -webkit-transform: scale(2.4);
        -ms-transform: scale(2.4);
        transform: scale(2.4);
        border-radius: 50%;
        background-color: #f2f5f8;
        z-index: -1;
      }

      .notfound h1 {
        font-size: 65px;
        font-weight: 700;
        margin-top: 0px;
        margin-bottom: 10px;
        color: #151723;
        text-transform: uppercase;
      }

      .notfound h2 {
        font-size: 21px;
        font-weight: 400;
        margin: 0;
        text-transform: uppercase;
        color: #151723;
      }

      .notfound p {
        color: #999fa5;
        font-weight: 400;
      }

      .notfound a {
        display: inline-block;
        font-weight: 700;
        border-radius: 40px;
        text-decoration: none;
        color: #388dbc;
      }

      @media only screen and (max-width: 767px) {
        .notfound .notfound-404 {

          height: 110px;

        .notfound {
          padding-left: 15px;
          padding-right: 15px;
          padding-top: 110px;
        }
